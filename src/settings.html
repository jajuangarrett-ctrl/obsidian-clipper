<!DOCTYPE html>
<html>
	<head>
		<title>FJG Task Clipper Settings</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="style.css">
		<script src="browser-polyfill.min.js"></script>
	</head>
	<body class="settings-page">
		<main class="settings-shell">
			<header class="settings-header">
				<div>
					<p class="eyebrow">Obsidian</p>
					<h1>Task Clipper Settings</h1>
				</div>
			</header>

			<section class="settings-section">
				<h2>Destination</h2>
				<div class="settings-grid">
					<label>
						<span>Vault name (optional)</span>
						<input id="vault-name" type="text" autocomplete="off">
					</label>
					<label>
						<span>Task index page</span>
						<input id="destination-file" type="text" autocomplete="off">
					</label>
					<label>
						<span>Task notes folder</span>
						<input id="task-folder" type="text" autocomplete="off">
					</label>
				</div>
			</section>

			<section class="settings-section">
				<h2>Projects</h2>
				<form id="project-form" class="manage-form">
					<input id="project-name" type="text" placeholder="Project name" autocomplete="off">
					<button type="submit">Add project</button>
				</form>
				<div id="project-list" class="manage-list"></div>
			</section>

			<section class="settings-section">
				<h2>Tags</h2>
				<form id="tag-form" class="manage-form">
					<input id="tag-name" type="text" placeholder="Tag name" autocomplete="off">
					<button type="submit">Add tag</button>
				</form>
				<div id="tag-list" class="manage-list"></div>
			</section>

			<section class="settings-section">
				<h2>Statuses</h2>
				<form id="status-form" class="manage-form status-form">
					<input id="status-label" type="text" placeholder="Label" autocomplete="off">
					<input id="status-id" type="text" placeholder="Status tag value" autocomplete="off">
					<button type="submit">Add status</button>
				</form>
				<div id="status-list" class="manage-list"></div>
				<button id="reset-statuses" class="secondary" type="button">Reset default statuses</button>
			</section>

			<p id="settings-notice" class="notice" role="status"></p>
			<footer class="settings-actions">
				<button id="save-settings" class="primary" type="button">Save settings</button>
			</footer>
		</main>
		<script type="module" src="settings.js"></script>
	</body>
</html>

<!DOCTYPE html>
<html>
	<head>
		<title>FJG Obsidian Task Clipper</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="style.css">
		<script src="browser-polyfill.min.js"></script>
	</head>
	<body>
		<main class="task-shell">
			<header class="task-header">
				<div>
					<p class="eyebrow">Obsidian</p>
					<h1>Task Clipper</h1>
				</div>
				<button id="open-settings" class="icon-button" type="button" title="Settings">Settings</button>
			</header>

			<nav class="mode-tabs" aria-label="Task clipper mode">
				<button id="create-tab" class="active" type="button">Create Task</button>
				<button id="update-tab" type="button">Add Update</button>
			</nav>

			<section id="create-panel" class="mode-panel">
				<section class="field-group">
					<label for="task-title">Task title</label>
					<input id="task-title" type="text" autocomplete="off">
				</section>

				<section class="field-group">
					<label for="task-details">Task text</label>
					<textarea id="task-details" rows="7" placeholder="Selected text will appear here."></textarea>
				</section>

				<div class="two-column">
					<section class="field-group">
						<label for="status-select">Status</label>
						<select id="status-select"></select>
					</section>
					<section class="field-group">
						<label for="project-select">Project</label>
						<select id="project-select"></select>
					</section>
				</div>

				<section class="field-group">
					<label for="tags-field">Tags</label>
					<input id="tags-field" type="text" value="task" list="tag-options" autocomplete="off">
					<datalist id="tag-options"></datalist>
				</section>
			</section>

			<section id="update-panel" class="mode-panel is-hidden">
				<section class="field-group">
					<label for="update-task-query">Task to update</label>
					<input id="update-task-query" type="text" placeholder="Type task title or note filename" autocomplete="off">
				</section>

				<section class="field-group">
					<label for="update-text">Update text</label>
					<textarea id="update-text" rows="7" placeholder="Selected text will appear here."></textarea>
				</section>
			</section>

			<label class="checkbox-row">
				<input id="include-source" type="checkbox" checked>
				<span>Include page source</span>
			</label>

			<section class="preview">
				<div class="preview-header">
					<span>Preview</span>
					<span id="task-count">0 tasks</span>
				</div>
				<pre id="task-preview"></pre>
			</section>

			<p id="notice" class="notice" role="status"></p>

			<footer class="task-actions">
				<button id="save-task" class="primary" type="button">Create Task</button>
			</footer>
		</main>
		<script type="module" src="popup.js"></script>
	</body>
</html>

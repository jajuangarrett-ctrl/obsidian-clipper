<!DOCTYPE html>
<html>
	<head>
		<title>FJG Obsidian Task Clipper</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="style.css">
		<script src="browser-polyfill.min.js"></script>
	</head>
	<body>
		<main class="task-shell">
			<header class="task-header">
				<div>
					<p class="eyebrow">FJG Vault</p>
					<h1>Task Clipper</h1>
				</div>
				<button id="open-settings" class="icon-button" type="button" title="Settings">Settings</button>
			</header>

			<section class="field-group">
				<label for="task-text">Selected text</label>
				<textarea id="task-text" rows="7" placeholder="Select text on a page, then open the extension."></textarea>
			</section>

			<div class="two-column">
				<section class="field-group">
					<label for="status-select">Status</label>
					<select id="status-select"></select>
				</section>
				<section class="field-group">
					<label for="project-select">Project</label>
					<select id="project-select"></select>
				</section>
			</div>

			<section class="inline-add" id="project-add-row">
				<input id="new-project" type="text" placeholder="New project" autocomplete="off">
				<button id="add-project" type="button">Add</button>
			</section>

			<section class="inline-add" id="status-add-row">
				<input id="new-status-label" type="text" placeholder="New status label" autocomplete="off">
				<input id="new-status-id" type="text" placeholder="Hashtag" autocomplete="off">
				<button id="add-status" type="button">Add</button>
			</section>

			<section class="preview">
				<div class="preview-header">
					<span>Preview</span>
					<span id="task-count">0 tasks</span>
				</div>
				<pre id="task-preview"></pre>
			</section>

			<p id="notice" class="notice" role="status"></p>

			<footer class="task-actions">
				<button id="copy-task" type="button">Copy</button>
				<button id="save-task" class="primary" type="button">Add to Obsidian</button>
			</footer>
		</main>
		<script type="module" src="popup.js"></script>
	</body>
</html>
